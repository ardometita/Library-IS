<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali's Library</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #D4C4A8;
  --paper:   #FDF6EC;
  --paper2:  #F5EAD8;
  --brown:   #5C3317;
  --brown2:  #7A4A26;
  --wood:    #A0633A;
  --amber:   #C97D3F;
  --amber2:  #E09B6A;
  --text:    #3A2210;
  --muted:   #7A5C3A;
  --border:  rgba(92,51,23,0.15);
  --ok:      #4A7A3A;
  --okbg:    #E6F2E0;
  --warn:    #B5750E;
  --warnbg:  #FDF2D8;
  --red:     #A83220;
  --redbg:   #FAEAE5;
  --r:       14px;
  --sh:      0 4px 24px rgba(92,51,23,0.13);
  --sh2:     0 2px 10px rgba(92,51,23,0.09);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--text);
  padding:0 0 60px;
}

/* ── HERO ── */
.hero{
  position:relative;
  overflow:hidden;
  background:#1A4040;
  margin-bottom:28px;
}
.hero-svg-bg{
  display:block;
  width:100%;
  height:auto;
}


/* Hero title overlay */
.hero-title{
  position:absolute;
  top:22px; left:50%; transform:translateX(-50%);
  text-align:center;
  white-space:nowrap;
  z-index:20;
}
.hero-title h1{
  font-family:'Playfair Display',serif;
  font-size:2.2em;
  color:#FDF6EC;
  text-shadow:0 2px 12px rgba(0,0,0,0.35);
  letter-spacing:1.5px;
}
.hero-title p{
  font-size:13px;
  color:rgba(253,246,236,0.85);
  font-weight:700;
  letter-spacing:0.8px;
  margin-top:4px;
}

/* ── MAIN CONTENT ── */
.wrap{max-width:1100px;margin:0 auto;padding:0 18px;}

.stats{
  display:flex;flex-wrap:wrap;gap:12px;
  margin-bottom:20px;justify-content:center;
}
.stat{
  background:var(--brown);color:var(--paper);
  border-radius:14px;padding:14px 22px;
  text-align:center;flex:1;min-width:110px;box-shadow:var(--sh);
}
.stat-n{font-size:1.8em;font-weight:900;color:var(--amber2);line-height:1;}
.stat-l{font-size:10.5px;font-weight:700;opacity:0.7;text-transform:uppercase;letter-spacing:0.7px;margin-top:3px;}

.card{
  background:var(--paper);border-radius:var(--r);
  padding:20px 22px;box-shadow:var(--sh);margin-bottom:16px;
  border:1px solid rgba(255,255,255,0.65);
}
.card-title{
  font-family:'Playfair Display',serif;font-size:1em;
  color:var(--brown);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.ib{
  width:28px;height:28px;background:var(--amber);
  border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:14px;
}

.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:680px){.two{grid-template-columns:1fr;}}

.row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
.fw{display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px;}
.fw label{font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;}
input[type=text],input[type=number]{
  padding:9px 13px;border:1.5px solid var(--border);
  border-radius:10px;font-family:'Nunito',sans-serif;
  font-size:13.5px;color:var(--text);background:var(--paper2);
  outline:none;transition:border-color .2s,box-shadow .2s;
}
input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(201,125,63,0.18);background:white;}
input::placeholder{color:#B09A84;}

.btn{
  padding:9px 16px;border:none;border-radius:9px;
  cursor:pointer;font-family:'Nunito',sans-serif;
  font-size:12.5px;font-weight:800;
  transition:transform .15s,box-shadow .15s,background .15s;
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap;
}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-p{background:var(--brown);color:var(--paper);box-shadow:0 3px 10px rgba(92,51,23,.28);}
.btn-p:hover{background:var(--brown2);}
.btn-a{background:var(--amber);color:white;box-shadow:0 3px 10px rgba(201,125,63,.32);}
.btn-a:hover{background:var(--amber2);}
.btn-g{background:var(--paper2);color:var(--muted);border:1.5px solid var(--border);}
.btn-g:hover{background:var(--paper);color:var(--brown);}
.btn-ok{background:var(--ok);color:white;box-shadow:0 3px 8px rgba(74,122,58,.3);}
.btn-ok:hover{background:#3A6A2A;}
.btn-w{background:var(--warn);color:white;box-shadow:0 3px 8px rgba(181,117,14,.3);}
.btn-w:hover{background:#9A620A;}
.btn-r{background:var(--red);color:white;box-shadow:0 3px 8px rgba(168,50,32,.3);}
.btn-r:hover{background:#8A2818;}
.btn-sm{padding:5px 11px;font-size:11.5px;border-radius:7px;}
.ctrls{display:flex;flex-wrap:wrap;gap:9px;}

.srch-wrap{position:relative;max-width:480px;margin:0 auto 18px;}
.srch-wrap input{width:100%;padding:11px 16px 11px 42px;border-radius:12px;font-size:13.5px;}
.srch-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px;opacity:.45;}

.pill{
  display:inline-flex;background:var(--paper2);
  border-radius:9px;padding:3px;border:1.5px solid var(--border);
}
.pill button{
  padding:6px 14px;border:none;border-radius:6px;
  cursor:pointer;font-family:'Nunito',sans-serif;
  font-size:12px;font-weight:800;color:var(--muted);
  background:transparent;transition:all .2s;
}
.pill button.on{background:var(--brown);color:var(--paper);box-shadow:0 2px 6px rgba(92,51,23,.22);}

.tbl-wrap{overflow-x:auto;border-radius:11px;}
table{width:100%;border-collapse:collapse;min-width:540px;}
thead{background:var(--brown);color:var(--paper);}
th{padding:12px 13px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;text-align:center;}
td{padding:12px 13px;text-align:center;border-bottom:1px solid rgba(0,0,0,0.05);font-size:13px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:rgba(201,125,63,0.06);}
tbody tr.ov-row{background:rgba(168,50,32,0.06);}

.bdg{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:800;}
.bdg-ok{background:var(--okbg);color:var(--ok);}
.bdg-w{background:var(--warnbg);color:var(--warn);}
.bdg-r{background:var(--redbg);color:var(--red);}

.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
.bcard{
  background:var(--paper);border-radius:13px;padding:16px;
  box-shadow:var(--sh2);border:1px solid rgba(255,255,255,.7);
  transition:transform .2s,box-shadow .2s;
}
.bcard:hover{transform:translateY(-4px);box-shadow:var(--sh);}
.bcard.ov-card{border:2px solid rgba(168,50,32,.35);background:#FDF5F2;}
.bcard-title{font-family:'Playfair Display',serif;font-size:1em;color:var(--brown);margin-bottom:8px;line-height:1.3;}
.bcard-row{display:flex;justify-content:space-between;margin:5px 0;font-size:12.5px;}
.bcard-lbl{font-weight:800;color:var(--muted);}
.bcard-acts{margin-top:12px;display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}

.bw-item{
  background:var(--paper2);border-radius:11px;
  padding:12px 15px;margin-bottom:9px;
  display:flex;align-items:center;flex-wrap:wrap;gap:9px;
  border:1px solid var(--border);
}
.bw-av{
  width:38px;height:38px;border-radius:50%;
  background:var(--amber);display:flex;align-items:center;
  justify-content:center;font-weight:900;font-size:14px;color:white;flex-shrink:0;
}
.bw-info{flex:1;min-width:90px;}
.bw-name{font-weight:800;color:var(--brown);font-size:14px;}
.bw-meta{font-size:11.5px;color:var(--muted);margin-top:1px;}
.bw-bdgs{display:flex;gap:5px;flex-wrap:wrap;}
.bw-acts{display:flex;gap:5px;}

.no-res{text-align:center;padding:44px 20px;color:var(--muted);}
.no-res .ni{font-size:44px;margin-bottom:10px;}
.no-res p{font-size:1.05em;font-weight:700;}
.mt14{margin-top:14px;}
.empty-msg{text-align:center;color:var(--muted);font-size:13px;padding:18px;}

@media(max-width:600px){
  .ctrls,.stats{flex-direction:column;}
  .stats .stat{min-width:unset;}
}
</style>
</head>

</div><!-- end wrap -->

<script>
let books=[],borrowers=[],filteredBooks=[];
let isCardView=false,nextBookId=1,nextBorrowerId=1;
let sortDir={title:'asc',year:'asc'};

function initials(n){return n.split(' ').slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');}
function isOverdue(b){return !b.isAvailable&&b.dueDate&&new Date()>b.dueDate;}

function createBorrower(name){
  return{
    id:nextBorrowerId++,name,borrowed:[],
    borrow(book){
      if(!book.isAvailable)return{success:false,message:`"${book.title}" is not available.`};
      const d=new Date(),due=new Date(d.getTime()+14*864e5);
      book.isAvailable=false;book.borrowedBy=this.id;book.borrowDate=d;book.dueDate=due;
      this.borrowed.push({bookId:book.id,borrowDate:d,dueDate:due});
      return{success:true,message:`"${book.title}" borrowed! Due: ${due.toLocaleDateString()}`};
    },
    returnBook(title){
      const book=books.find(b=>b.title.toLowerCase()===title.toLowerCase()&&b.borrowedBy===this.id);
      if(!book)return{success:false,message:`You haven't borrowed "${title}".`};
      this.borrowed=this.borrowed.filter(b=>b.bookId!==book.id);
      book.isAvailable=true;book.borrowedBy=null;book.borrowDate=null;book.dueDate=null;
      return{success:true,message:`"${book.title}" returned! 🎉`};
    },
    listBorrowedBooks(){
      if(!this.borrowed.length)return`${this.name} has no borrowed books.`;
      let r=`${this.name}'s Borrowed Books:\n`;
      this.borrowed.forEach((rec,i)=>{
        const b=books.find(b=>b.id===rec.bookId);
        if(b){const od=new Date()>rec.dueDate;r+=`${i+1}. "${b.title}" — Due: ${rec.dueDate.toLocaleDateString()} ${od?'⚠️ OVERDUE':'✓'}\n`;}
      });
      return r;
    }
  };
}

function addBorrower(){
  const name=document.getElementById('borrowerName').value.trim();
  if(!name){alert('Please enter a name.');return;}
  if(borrowers.find(b=>b.name.toLowerCase()===name.toLowerCase())){alert(`"${name}" already exists!`);return;}
  borrowers.push(createBorrower(name));
  document.getElementById('borrowerName').value='';
  renderBorrowers();updateStats();toast(`Borrower "${name}" added!`);
}
function deleteBorrower(id){
  const b=borrowers.find(b=>b.id===id);if(!b)return;
  if(b.borrowed.length){alert(`Return all books first.`);return;}
  if(!confirm(`Delete "${b.name}"?`))return;
  borrowers=borrowers.filter(x=>x.id!==id);
  renderBorrowers();updateStats();toast(`Removed "${b.name}".`);
}
function renderBorrowers(){
  const el=document.getElementById('borrowersList');
  if(!borrowers.length){el.innerHTML='<p class="empty-msg">No borrowers yet. Add one above!</p>';return;}
  el.innerHTML=borrowers.map(b=>{
    const cnt=b.borrowed.length,odc=b.borrowed.filter(r=>new Date()>r.dueDate).length,ini=initials(b.name);
    return`<div class="bw-item">
      <div class="bw-av">${ini}</div>
      <div class="bw-info">
        <div class="bw-name">${b.name}</div>
        <div class="bw-meta">ID #${b.id}${cnt?` · ${cnt} book${cnt>1?'s':''} borrowed`:' · No active borrows'}</div>
      </div>
      <div class="bw-bdgs">
        ${cnt?`<span class="bdg bdg-w"> ${cnt}</span>`:''}
        ${odc?`<span class="bdg bdg-r">⚠️ ${odc} overdue</span>`:''}
      </div>
      <div class="bw-acts">
        ${cnt?`<button class="btn btn-g btn-sm" onclick="showReport(${b.id})">Report</button>`:''}
        <button class="btn btn-r btn-sm" ${cnt?'disabled title="Return all books first"':''} onclick="deleteBorrower(${b.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}
function showReport(id){const b=borrowers.find(x=>x.id===id);if(b)alert(b.listBorrowedBooks());}

function addBook(){
  const title=document.getElementById('bookTitle').value.trim();
  const author=document.getElementById('bookAuthor').value.trim();
  const year=parseInt(document.getElementById('bookYear').value);
  if(!title||!author||!year||year<1000||year>2099){alert('Fill all fields. Year: 1000–2099.');return;}
  books.push({id:nextBookId++,title,author,year,isAvailable:true,borrowedBy:null,borrowDate:null,dueDate:null});
  document.getElementById('bookTitle').value='';
  document.getElementById('bookAuthor').value='';
  document.getElementById('bookYear').value='';
  applySearch();toast(`"${title}" added!`);
}
function editBook(id){
  const b=books.find(x=>x.id===id);if(!b)return;
  const t=prompt('Title:',b.title);if(t===null)return;
  const a=prompt('Author:',b.author);if(a===null)return;
  const y=prompt('Year:',b.year);if(y===null)return;
  if(t.trim()&&a.trim()&&y){
    const yr=parseInt(y);
    if(yr>=1000&&yr<=2099){b.title=t.trim();b.author=a.trim();b.year=yr;applySearch();toast('Updated!');}
    else alert('Invalid year.');
  }
}
function borrowDialog(bookId){
  const book=books.find(b=>b.id===bookId);if(!book)return;
  if(!borrowers.length){alert('Add a borrower first!');return;}
  const list=borrowers.map((b,i)=>`${i+1}. ${b.name} (ID: ${b.id})`).join('\n');
  const sel=prompt(`Select borrower:\n${list}`);if(sel===null)return;
  const idx=parseInt(sel)-1;
  if(idx>=0&&idx<borrowers.length){
    const r=borrowers[idx].borrow(book);
    if(r.success){applySearch();renderBorrowers();updateStats();}
    toast(r.message);
  }else alert('Invalid selection.');
}
function returnDialog(bookId){
  const book=books.find(b=>b.id===bookId);if(!book||!book.borrowedBy)return;
  const bw=borrowers.find(b=>b.id===book.borrowedBy);if(!bw)return;
  const r=bw.returnBook(book.title);
  if(r.success){applySearch();renderBorrowers();updateStats();}
  toast(r.message);
}
function deleteBook(id){
  const b=books.find(x=>x.id===id);
  if(b&&!b.isAvailable){alert('Return the book first.');return;}
  if(!confirm('Delete this book?'))return;
  books=books.filter(x=>x.id!==id);applySearch();toast('Book removed.');
}

function filterAfter2015(){filteredBooks=books.filter(b=>b.year>=2015);render();}
function sortByTitle(){
  filteredBooks.sort((a,b)=>sortDir.title==='asc'?a.title.localeCompare(b.title):b.title.localeCompare(a.title));
  sortDir.title=sortDir.title==='asc'?'desc':'asc';render();
}
function sortByYear(){
  filteredBooks.sort((a,b)=>sortDir.year==='asc'?a.year-b.year:b.year-a.year);
  sortDir.year=sortDir.year==='asc'?'desc':'asc';render();
}
function resetFilters(){
  filteredBooks=[...books];
  document.getElementById('searchInput').value='';
  sortDir={title:'asc',year:'asc'};render();
}
function applySearch(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  filteredBooks=books.filter(b=>b.title.toLowerCase().includes(q));
  render();
}
document.getElementById('searchInput').addEventListener('input',applySearch);

function setView(v){
  isCardView=(v==='card');
  document.getElementById('btnTable').classList.toggle('on',!isCardView);
  document.getElementById('btnCard').classList.toggle('on',isCardView);
  render();
}

function renderTable(bks){
  document.getElementById('tableBody').innerHTML=bks.map(book=>{
    const od=isOverdue(book),bw=book.borrowedBy?borrowers.find(b=>b.id===book.borrowedBy):null;
    const bc=book.isAvailable?'bdg-ok':(od?'bdg-r':'bdg-w');
    const bt=book.isAvailable?'Available':(od?'⚠ Overdue':'Borrowed');
    const due=book.dueDate?book.dueDate.toLocaleDateString():'—';
    return`<tr class="${od?'ov-row':''}">
      <td style="font-weight:800;color:var(--brown);text-align:left;">${book.title}</td>
      <td>${book.author}</td><td>${book.year}</td>
      <td><span class="bdg ${bc}">${bt}</span></td>
      <td>${bw?bw.name:'—'}</td>
      <td style="${od?'color:var(--red);font-weight:800;':''}">${due}</td>
      <td><div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-g btn-sm" onclick="editBook(${book.id})">Edit</button>
        ${book.isAvailable?`<button class="btn btn-ok btn-sm" onclick="borrowDialog(${book.id})">Borrow</button>`:`<button class="btn btn-w btn-sm" onclick="returnDialog(${book.id})">Return</button>`}
        <button class="btn btn-r btn-sm" onclick="deleteBook(${book.id})">✕</button>
      </div></td>
    </tr>`;
  }).join('');
}
function renderCards(bks){
  document.getElementById('cardView').innerHTML=bks.map(book=>{
    const od=isOverdue(book),bw=book.borrowedBy?borrowers.find(b=>b.id===book.borrowedBy):null;
    const bc=book.isAvailable?'bdg-ok':(od?'bdg-r':'bdg-w');
    const bt=book.isAvailable?'Available':(od?'⚠ Overdue':'Borrowed');
    return`<div class="bcard${od?' ov-card':''}">
      <div class="bcard-title">${book.title}</div>
      <div class="bcard-row"><span class="bcard-lbl">Author</span><span>${book.author}</span></div>
      <div class="bcard-row"><span class="bcard-lbl">Year</span><span>${book.year}</span></div>
      <div class="bcard-row"><span class="bcard-lbl">Status</span><span class="bdg ${bc}">${bt}</span></div>
      ${!book.isAvailable?`
      <div class="bcard-row"><span class="bcard-lbl">Borrower</span><span>${bw?bw.name:'—'}</span></div>
      <div class="bcard-row"><span class="bcard-lbl">Due</span><span style="${od?'color:var(--red);font-weight:800;':''}">${book.dueDate?.toLocaleDateString()||'—'}</span></div>`:''}
      <div class="bcard-acts">
        <button class="btn btn-g btn-sm" onclick="editBook(${book.id})">Edit</button>
        ${book.isAvailable?`<button class="btn btn-ok btn-sm" onclick="borrowDialog(${book.id})">Borrow</button>`:`<button class="btn btn-w btn-sm" onclick="returnDialog(${book.id})">Return</button>`}
        <button class="btn btn-r btn-sm" onclick="deleteBook(${book.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}
function render(){
  const tv=document.getElementById('tableViewContainer'),cv=document.getElementById('cardView'),nr=document.getElementById('noResults');
  if(!filteredBooks.length){nr.style.display='block';tv.style.display='none';cv.style.display='none';}
  else{
    nr.style.display='none';
    renderTable(filteredBooks);renderCards(filteredBooks);
    if(isCardView){tv.style.display='none';cv.style.display='grid';}
    else{tv.style.display='block';cv.style.display='none';}
  }
  updateStats();
}
function updateStats(){
  document.getElementById('s-total').textContent=books.length;
  document.getElementById('s-avail').textContent=books.filter(b=>b.isAvailable).length;
  document.getElementById('s-borrowed').textContent=books.filter(b=>!b.isAvailable).length;
  document.getElementById('s-overdue').textContent=books.filter(b=>isOverdue(b)).length;
  document.getElementById('s-members').textContent=borrowers.length;
}
function toast(msg){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--brown);color:var(--paper);padding:11px 20px;border-radius:11px;font-family:Nunito,sans-serif;font-size:13.5px;font-weight:800;box-shadow:0 6px 20px rgba(0,0,0,0.22);z-index:9999;transition:opacity .4s;max-width:90vw;text-align:center;`;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},2400);
}

// Init
render();renderBorrowers();

// Librarian greeting animation
const libChar=document.getElementById('lib-char');
const eyesIdle=document.getElementById('eyes-idle');
const eyesGreet=document.getElementById('eyes-greet');
const smileIdle=document.getElementById('smile-idle');
const smileGreet=document.getElementById('smile-greet');

function greet(){
  eyesIdle.style.opacity='0';
  eyesGreet.style.opacity='1';
  smileIdle.style.opacity='0';
  smileGreet.style.opacity='1';
  libChar.classList.add('greet');
  setTimeout(()=>{
    eyesIdle.style.opacity='1';
    eyesGreet.style.opacity='0';
    smileIdle.style.opacity='1';
    smileGreet.style.opacity='0';
    libChar.classList.remove('greet');
  },2800);
}
eyesIdle.style.transition='opacity 0.3s';
smileIdle.style.transition='opacity 0.3s';
setTimeout(()=>{greet();setInterval(greet,7000);},1400);
</script>
</body>
</html>
